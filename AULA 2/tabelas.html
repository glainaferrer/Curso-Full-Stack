 <!-- Uma Tabela em HTML é formada por:
   <table> tabela 
    <tr> - table row (linha da tabela)
    <th> - table header (cabeçalho da tabela)
    <td> - table data (dados da tabela)
   </table>
    -->


    <h1>Exemplo de Tabela</h1>

    <table border="1">
        <th>Nome</th>
