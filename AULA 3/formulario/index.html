<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <div class="card-cadastro">
    <h2>Formulário de Cadastro</h2>
    <form id="meuFormulario">
        <div class="campo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
        </div>

        <div class="campo">
            <label for="sobrenome">Sobrenome</label>
            <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu sobrenome">
        </div>

        <div class="campo-duplo">
            <div class="campo">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">
            </div>
            <div class="campo">
                <label for="data_nasc">Nascimento</label>
                <input type="date" id="data_nasc" name="data_nasc">
            </div>
        </div>

        <div class="campo">
            <label for="sede">Sede</label>
            <select id="sede" name="sede">
                <option value="" disabled selected>Selecione uma Sede</option>
                <option value="Ald">Aldeota</option>
                <option value="Bez">Bezerra</option>
                <option value="Sul">Sul</option>
            </select>
        </div>

        <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com">
        </div>

        <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Crie uma senha forte">
        </div>

        <button type="submit">Finalizar Cadastro</button>
    </form>
</div>
    </div>
    
</body>
</html>
